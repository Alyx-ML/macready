name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Generate GitHub Pages data
        run: |
          bun run backend/server.ts > /tmp/macready-backend.log 2>&1 &
          backend_pid=$!
          for attempt in $(seq 1 40); do
            if curl --fail --silent --output /dev/null http://localhost:8421/api/v1/gamedb/games; then
              break
            fi
            sleep 1
          done
          mkdir -p frontend/public/data
          curl --fail --silent --show-error http://localhost:8421/api/v1/gamedb/news --output frontend/public/data/news.json
          curl --fail --silent --show-error 'http://localhost:8421/api/v1/gamedb/steam/trending?details=1&limit=200' --output frontend/public/data/steam-trending.json
          curl --fail --silent --show-error http://localhost:8421/api/v1/gamedb/steam/search-index --output frontend/public/data/steam-search-index.json
          kill "$backend_pid"

      - name: Build frontend
        run: bun run build
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          VITE_GITHUB_PAGES_DATA: "true"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
